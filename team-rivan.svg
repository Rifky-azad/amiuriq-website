  <path d="M78 148 Q100 160 122 148 L130 185 Q100 195 70 185 Z" fill="#2a4a6b"/>
  <!-- Neck -->
  <rect x="89" y="130" width="22" height="25" rx="8" fill="#c8906a"/>
