      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <clipPath id="circle1"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg1)"/>
  <!-- Shoulders -->
  <ellipse cx="100" cy="185" rx="60" ry="35" fill="#1e2d45"/>
