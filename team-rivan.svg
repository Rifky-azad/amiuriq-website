  <path d="M81 101 Q87 98 93 101" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M107 101 Q113 98 119 101" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
