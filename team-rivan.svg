  <ellipse cx="100" cy="110" rx="38" ry="42" fill="#c8906a"/>
  <!-- Hair - short dark -->
  <ellipse cx="100" cy="78" rx="38" ry="18" fill="#1a0a00"/>
  <rect x="62" y="75" width="76" height="15" rx="5" fill="#1a0a00"/>
  <!-- Eyes -->
  <ellipse cx="87" cy="108" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="113" cy="108" rx="5" ry="5.5" fill="white"/>
  <circle cx="88" cy="109" r="3" fill="#1a0a00"/>
  <circle cx="114" cy="109" r="3" fill="#1a0a00"/>
  <circle cx="89" cy="108" r="1" fill="white"/>
