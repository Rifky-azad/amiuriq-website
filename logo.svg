<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4940A"/>
      <stop offset="100%" stop-color="#F5C500"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4940A"/>
      <stop offset="100%" stop-color="#F5C500"/>
    </linearGradient>
  </defs>

  <!-- Icon box: amber gradient rounded square -->
  <rect x="0" y="0" width="80" height="80" rx="18" ry="18" fill="url(#iconGrad)"/>

  <!-- "A" mark as filled white shapes (no strokes — fully solid) -->
  <!-- Left leg of A -->
  <polygon points="40,10 14,70 24,70 34,42 40,24" fill="white"/>
  <!-- Right leg of A -->
  <polygon points="40,10 66,70 56,70 46,42 40,24" fill="white"/>
  <!-- Crossbar -->
  <rect x="22" y="44" width="36" height="8" rx="4" fill="white"/>

  <!-- Wordmark using safe bold font -->
  <text
    x="96"
    y="54"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="40"
    font-weight="900"
    fill="url(#textGrad)"
    letter-spacing="-1"
  >Amiuriq</text>
</svg>
